module.exports = "<app-header></app-header>\n<section id=\"cdr-body\">\n<div class=\"container-fluid\">\n<div fxLayout=\"row\" fxLayoutAlign=\"space-between start\" fxLayoutGap=\"15px\" fxLayout.xs=\"column\" fxLayout.sm=\"column\" fxLayoutAlign.xs=\"center stretch\" fxLayoutAlign.sm=\"center stretch\">\n<app-data-room-left fxFlex=\"15\" fxFlex.xs=\"100\" fxFlexOrder.xs=\"1\"></app-data-room-left>\n\n\n<div fxFlex=\"64\" fxFlex.xs=\"100\" fxFlexOrder.xs=\"2\">\n  <mat-card class=\"mat-card p0\">\n    <mat-toolbar>Reports</mat-toolbar>\n    <div class=\"page-hdname\">\n       <div class=\"title-pg-act\">\n          <i class=\"material-icons cnr-icon\">&#xE065;</i>\n          <span class=\"t-text\">Index Report</span>\n       </div>\n\n    </div>\n    <div class=\"datatime-status minHeight\">\n                  <div class=\"topbar-af\">\n                      <div class=\"form-group row marauto\">\n                          <label class=\"col-form-label\">Select Users</label>\n                          <div class=\"col-7\">\n                              <select class=\"form-control\" [(ngModel)]=\"member_id\" name=\"member_id\" >\n                                <option value=\"0\">--Select--</option>\n                                <option [value]=\"member.member.id\" *ngFor=\"let member of members\">{{ member.member.first_name }} {{ member.member.last_name }}</option>\n                              </select>\n                          </div>\n                      </div>\n                      <span fxFlex></span>\n                      <button mat-raised-button color=\"primary\" (click)=\"GetIndexReports()\">Download</button>\n                  </div>\n              </div>\n              \n              <hr class=\"marauto\">\n    <!-- <div class=\"showlist\">\n        <ul class=\"list-unstyled ovlist\">\n          <button mat-raised-button color=\"primary\" (click)=\"GetIndexReports()\">Download</button>\n          <li class=\"media file-list ovitlist\" *ngFor=\"let item of data; let i = index\">\n            <div class=\"media-body\">\n              <h6 class=\"tx-inverse mn-hdst\">New Index report generated by {{ item.user.first_name }} {{ item.user.last_name }}</h6>\n              <button class=\"rd-t-downbtn dr-chip active\">{{ item.user.email }}</button>\n            </div>\n            <div class=\"ritsi-content\">\n              <span class=\"dtime-dt\">{{ item.created_date }}</span>\n              <div class=\"spetwo-dd\">\n                <a (click)=\"GoToTrash(item.id, i)\"><i class=\"fa fa-trash-o\" ></i></a>\n            </div>\n          </div>\n          </li>\n\n        </ul>\n    </div> -->\n\n  </mat-card>\n</div>\n<div fxFlex=\"23\" fxFlex.xs=\"100\" fxFlexOrder.xs=\"3\">\n  <app-report-tab></app-report-tab>\n</div>\n</div>\n</div>\n</section>\n<app-footer></app-footer>\n\n<!-- edit data room -->\n\n<!-- End of dataroom model here -->\n"
