module.exports = "<mat-card class=\"rounded mb-10 p-0 \">\n  <mat-toolbar class=\"cdr-toolbar \">\n    <span>Current Usage</span>\n    <span class=\"spacer \"></span>\n    <button mat-button class=\"minimise-btn ico-bnt \" (click)=\"getAllDataroomsUsage()\"><i class=\"fa fa-refresh \"></i></button>\n  </mat-toolbar>\n  <div class=\"half-chart text-center \">\n    <!--   <img src=\"assets/images/helf-chart.jpg \" class=\"img-fluid \">\n -->\n    <div [chart]=\"chart\" class=\"piechart half-pie-chart\"></div>\n  </div>\n</mat-card>\n"
