module.exports = "<section class=\"cdr-body\">\n    <div fxLayout=\"row\" fxLayoutAlign=\"space-between\" fxLayout.xs=\"column\" fxLayout.sm=\"column\" fxLayoutAlign.xs=\"center stretch\" fxLayoutAlign.sm=\"center stretch\">\n        <div fxFlex=\"64\" fxFlex.xs=\"100\" fxFlexOrder.xs=\"2\" style=\"margin:0 auto\">\n            <div class=\"pdfvie-head\">\n                <h3>Please Read Carefully</h3>\n                <span>You must accept these terms to enter the data room</span>\n            </div>\n            <div class=\"pdfviewmain\">\n                <div class=\"pdftoolbar\">\n                    <button mat-mini-fab class=\"mat-elevation-z0\"><i class=\"material-icons\">keyboard_arrow_left</i></button>\n                    <mat-form-field class=\"example-full-width\">\n                        <input matInput placeholder=\"Page 1 of 2\" value=\"1\">\n                    </mat-form-field>\n                    <button mat-mini-fab class=\"mat-elevation-z0\"><i class=\"material-icons\">keyboard_arrow_right</i></button>\n                </div>\n                <perfect-scrollbar class=\"scroll-section h-500\">\n                    <div class=\"pdfviewcon\">\n                        <pdf-viewer [src]=\"'https://vadimdez.github.io/ng2-pdf-viewer/pdf-test.pdf'\" [render-text]=\"true\" style=\"display: block;\"></pdf-viewer>\n                    </div>\n                </perfect-scrollbar>\n            </div>\n            <div class=\"pdfvie-foot\">\n                <div fxLayout=\"row\" fxLayoutAlign=\"space-between center\">\n                    <span><mat-checkbox>I Agree!</mat-checkbox></span>\n                    <button mat-raised-button color=\"primary\" class=\"blue-btn bdr-rad3\" type=\"button\">Submit</button>\n                    <span>\n                      <button class=\"icon-btn\">\n                        <i class=\"fa fa-download t-icon\"></i>\n                        <span class=\"t-text\">Download</span>\n                    </button>\n                    </span>\n                </div>\n            </div>\n        </div>\n    </div>\n</section>"
