module.exports = "<app-header></app-header>\n<div class=\"row justify-content-md-center\">\n              \n<section class=\"cdr-body\">\n    <div fxLayout=\"row\" fxLayoutAlign=\"space-between\" fxLayout.xs=\"column\" fxLayout.sm=\"column\" fxLayoutAlign.xs=\"center stretch\" fxLayoutAlign.sm=\"center stretch\">\n        <div fxFlex=\"100\" fxFlex.xs=\"100\" fxFlexOrder.xs=\"2\" style=\"margin:0 auto\">\n\n            <div class=\"pdfvie-head\">\n                <h3>Please Read Carefully <span>\n                      <button mat-raised-button color=\"primary\" class=\"blue-btn mx-4 bdr-rad3\" type=\"button\" (click)=\"goToBack()\">Back</button>\n                    </span></h3> \n            </div>\n            <div class=\"pdfviewmain\">\n                <div class=\"pdftoolbar\">\n                </div>\n                    <div class=\"pdfviewcon\">\n                         <iframe\n                        [src]=\"url\"\n                        class=\"dr-invoice\">\n                        </iframe> \n                    </div>z\n            </div>\n            <div class=\"pdfvie-foot\">\n                <div fxLayout=\"row\" fxLayoutAlign=\"center center\">\n                    <span *ngIf=\"is_view_disclaimer\"><mat-checkbox (change)=\"EnableButton($event.checked)\">I Agree!</mat-checkbox></span>\n                    <button *ngIf=\"is_view_disclaimer\" mat-raised-button color=\"primary\" class=\"blue-btn mx-4 bdr-rad3\" type=\"button\" (click)=\"AgreeDisclaimer()\" [disabled]=\"disable\">Submit</button>\n                    <span>\n                      <button class=\"icon-btn\">\n                        <i class=\"fa fa-download t-icon\"></i>\n                        <span class=\"t-text\">Download</span>\n                    </button>\n                    </span>\n                    \n                </div>\n            </div>\n        </div>\n    </div>\n</section>\n\n              </div>"
