module.exports = "<mat-card class=\"rounded mb-10 p-0\">\n  <mat-toolbar class=\"cdr-toolbar\">\n    <span>Data Rooms Allocated</span>\n    <span class=\"spacer \"></span>\n    <button mat-button class=\"minimise-btn ico-bnt \" (click)=\"getAllDataroomsUsage()\"><i class=\"fa fa-refresh \"></i></button>\n  </mat-toolbar>\n  <div class=\"half-chart chart-one text-center\">\n    <div [chart]=\"chart\" class=\"piechart\"></div>\n  </div>\n</mat-card>\n"
