module.exports = "<div mat-dialog-title *ngIf=\"data.copy\">Copy<i class=\"fa fa-times\" aria-hidden=\"true\" (click)=\"onNoClick()\" style=\"float: right !important;cursor: pointer;\"></i>\n</div>\n\n<div mat-dialog-title *ngIf=\"data.move\">Move<i class=\"fa fa-times\" aria-hidden=\"true\" (click)=\"onNoClick()\" style=\"float: right !important;cursor: pointer;\"></i>\n</div>\n\n<div mat-dialog-content>\n\t<perfect-scrollbar class=\"scroll-section h-170 docu-tree\">\n    <tree-root [nodes]=\"nodes\" [options]=\"options\"> \n\n    \t<ng-template #treeNodeTemplate let-node let-index=\"index\">\n          <button ><span>{{ node.data.name }}</span></button><mat-checkbox class=\"example-margin\" [checked]=\"selected === node.data.id\" (change)=\"select_destination(node.data.id)\"></mat-checkbox>\n        </ng-template>\n\n    </tree-root>   \n</perfect-scrollbar>\n\n<perfect-scrollbar class=\"scroll-section h-170 docu-tree\" *ngIf=\"nodes.length===0\">\n\t<mat-progress-spinner class=\"progress-align-center\" [mode]=\"'indeterminate'\" style=\"margin:0 auto !important;\"></mat-progress-spinner>\n</perfect-scrollbar>\n\n  \n</div>\n<div mat-dialog-actions>\n  \n  <button mat-button [mat-dialog-close]=\"selected\" class=\"btn btn-primary\" *ngIf=\"data.copy\">Confirm Copy</button>\n  <button mat-button [mat-dialog-close]=\"selected\" class=\"btn btn-primary\" *ngIf=\"data.move\">Confirm Move</button>\n</div>\n\n"
