module.exports = "<div mat-dialog-title>Notify<i class=\"fa fa-times\" aria-hidden=\"true\" (click)=\"onNoClick()\" style=\"float: right !important;cursor: pointer;\"></i></div>\n\n<div mat-dialog-content>\n  <div class=\"alert alert-danger\">\n        Are you sure you want to notify all permissioned members about new uploaded document/s?\n      </div>\n</div>\n<div mat-dialog-actions>\n  \n  <button mat-button [mat-dialog-close]=\"data.yes\" class=\"btn btn-primary\">Yes</button>\n  <button mat-button [mat-dialog-close]=\"data.no\" class=\"btn btn-primary\">No</button>\n</div>\n\n"
