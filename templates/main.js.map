module.exports = "                <mat-card class=\"rounded mb-30 p-0\">\n                    <mat-toolbar class=\"cdr-toolbar border-0\">\n                        <span>Login History</span>\n                        <span class=\"spacer\"></span>\n                        <!--<button mat-button class=\"minimise-btn ico-bnt\"><i class=\"material-icons\">&#xE15B;</i></button>-->\n                        <button mat-button class=\"minimise-btn ico-bnt\"><i class=\"fa fa-refresh\"></i></button>\n                    </mat-toolbar>\n                    <div class=\"cdr-table \">\n\n                        <perfect-scrollbar class=\"scroll-section h-350\" [config]=\"config\">\n                            <table class=\"table table-striped\">\n                                <thead>\n                                    <tr>\n                                        <th>Logged in</th>\n                                        <th class=\"text-right\">IP Address</th>\n                                    </tr>\n                                </thead>\n                                <tbody>\n                                    <tr *ngFor=\"let access of access_history;\">\n                                        <td>\n                                            <div class=\"action-items\">\n<!--                                                 <strong class=\"apply-act\">Logged in</strong>\n -->                                                <span class=\"act-time\">{{access.logged_in_time  }}</span>\n                                            </div>\n                                        </td>\n                                        <td class=\"text-right\"><strong class=\"dr-ip-add \">{{access.logged_in_ip}}</strong></td>\n                                    </tr>\n                                 \n                                </tbody>\n                            </table>\n                        </perfect-scrollbar>\n                    </div>\n                </mat-card>\n"
