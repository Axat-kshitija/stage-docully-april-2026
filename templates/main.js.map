module.exports = "<!--header component start-->\n<mat-toolbar class=\"topbar\" style=\"height: auto !important;\">\n  <div class=\"cdr_branding\" [routerLink]=\"['../dashboard']\">\n    <img src=\"assets/images/logo.png\" />\n  </div>\n  <div class=\"cdr-topToolbar\">\n    <div class=\"user-name\">\n      <button data-toggle=\"modal\" data-target=\"#userProfileCdr\">\n        <span id=\"uName\" *ngIf=\"user\">Welcome, {{ user.first_name }}</span>\n        <i class=\"fa fa-align-left\"></i>\n      </button>\n    </div>\n  </div>\n</mat-toolbar>\n<!--header component End-->\n\n<!-- Modal -->\n<div\n  class=\"modal md-lf-rt right fade\"\n  id=\"userProfileCdr\"\n  tabindex=\"-1\"\n  role=\"dialog\"\n  aria-labelledby=\"exampleModalLabel\"\n  aria-hidden=\"true\"\n>\n  <div class=\"modal-dialog\" role=\"document\">\n    <div class=\"modal-content\">\n      <div class=\"modal-header\" *ngIf=\"user\">\n        <div class=\"media profile-pic-dt\">\n          <img class=\"d-flex mr-3 rounded-circle\" [src]=\"avatarUrl\" />\n        </div>\n        <div class=\"media-body\">\n          <h5 class=\"mt-0\">{{ user.first_name }} {{ user.last_name }}</h5>\n          {{ user.email }}\n        </div>\n        <button\n          type=\"button\"\n          class=\"close\"\n          data-dismiss=\"modal\"\n          aria-label=\"Close\"\n        >\n          <i class=\"material-icons\">&#xE5CD;</i>\n        </button>\n      </div>\n      <!-- <div class=\"upgrade-account\">\n                <span>{{upgrade_msg}}</span>\n            </div> -->\n      <div class=\"modal-body p-0\">\n        <ul class=\"page-setting-nav\">\n          <li>\n            <a href=\"https://services.docullyvdr.com/#/user-personal-info\"\n              ><i class=\"fa fa-cog\"></i> Profile</a\n            >\n          </li>\n          <li>\n            <a href=\"https://docully.freshdesk.com/support/home\"\n              ><i class=\"fa fa-commenting-o\"></i> Support</a\n            >\n          </li>\n          <li (click)=\"resetDisclaimerStatus(user.id)\">\n            <a href=\"\"><i class=\"fa fa-sign-out\"></i> Sign Out</a>\n          </li>\n        </ul>\n        <!-- <div class=\"used-space-img text-center\">\n                    <img src=\"assets/images/total-size-used.jpg\"></div> -->\n      </div>\n    </div>\n  </div>\n</div>\n<!--add new data room modal-->\n"
