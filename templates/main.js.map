module.exports = "\n<perfect-scrollbar class=\"scroll-section h-170 docu-tree\" *ngIf=\"nodes.length>0\">\n    <tree-root [nodes]=\"nodes\" [options]=\"options\"> \n\n    \t<ng-template #treeNodeTemplate let-node let-index=\"index\">\n          <button ><span (click)=\"goToNextFolder(node.id)\">{{ node.data.number }}.{{ node.data.name }}</span>\n          </button>\n        </ng-template>\n\n    </tree-root>  \n</perfect-scrollbar>\n\n\n<perfect-scrollbar class=\"scroll-section h-170 docu-tree\" *ngIf=\"nodes.length===0\">\n\t<mat-progress-spinner class=\"progress-align-center\" [mode]=\"'indeterminate'\" style=\"margin:0 auto !important;\"></mat-progress-spinner>\n</perfect-scrollbar>"
